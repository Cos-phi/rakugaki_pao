
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750">
    <link rel="icon" href="../image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="../image/apple-touch-icon.png">
    <title>Edit Palette - rakugaki_pao</title>
    <link rel="stylesheet" type="text/css" href="../style.css?v=1">
    <style>
        .palette-row { padding: 24px; text-align: center;}
        .palette-label { display: inline-block; width: 120px; }
        .pen-background-input { width: 32px;}
        .palette-input { width: 64px;height: 64px; border-radius: 4px; border: 1px solid #36364A; cursor: pointer; }
        .color-list { display: flex; gap: 1px; margin-bottom: 8px; }
        .color-item { display: flex; flex-wrap: wrap; justify-content: center; width: 80px; }
        .add-color-btn {  height: 64px; border-radius: 4px; border: 1px solid #36364A; color: #36364A; font-size: 12px; text-align: center; cursor: pointer; }
        .color-edit-btn { border-style:none; background:none; font-size:12px; cursor:pointer; }
        .output-row { margin-top: 24px; display: flex; text-align:center}
        .output-box { width: 100%; font-size: 14px; }
        .palette-set-item { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; margin: 8px; width: 128px;}
        .palette-set-item-buttons { display: flex; gap: 4px; margin-top: 4px; }
        .palette-preview-div {
            width: 128px;
            height: 128px;
            border: 1px solid #36364A;
            margin-left: 2px;
            margin-right: 2px;
            cursor: pointer;
        }
        #paletteeditor-content {
            position: relative;
            width: 720px;
            margin-bottom: 16px;
            color: #36364A;
            border: 1px solid #505050;
            background-color: #F2EEE6;
            box-sizing:border-box;
            padding: 32px 32px;
        }
        #paletteSetListContainer {
            position: relative;
            width: 720px;
            color: #36364A;
            border: 0px solid #505050;
            box-sizing:border-box;
        }
        #palette-url-preview {
            margin-left: 32px;
            margin-right: 2px;
            height: 24px;
            width: 540px;
            padding: 2px 8px;
            font-size: 12px;
            color: #36364A;
            background:none;
            border-radius: 4px;
            border:#36364A solid 1px;
        }
        #copyPaletteUrlBtn {
            height: 32px;
            width: 32px;
            padding: 1px;
            border: none;
            background: none;
            cursor: pointer;
        }
        #copyPaletteUrlBtn:hover{
            background-color: #E0E0E0;
        }
        #copyPaletteUrlBtn:active{
            padding: 5px;
        }
        #add-palette-set-btn {
            font-size: 32px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            margin-top: 8px;
            width: 128x;
        }
        #applyRakugakiPaoBtn {
            padding: 0px;
            width: 240px;
            height: 42px;
            margin-left: auto;
            background-color: #6364ff;
            color: white;
            font-size: 16px;
            font-weight: bold;    
            border: none;
            border-radius: 4px;
        }
        #applyRakugakiPaoBtn:hover {
            background-color: #563ACC;
        }

    </style>
</head>
<body>
    <app id="app"> 
        <div id="controls-top">
            <div class="top-left-buttons">
                <button id="back" class="controls-top-button" title="rakugaki_paoに戻る">
                    <img src="../image/back.svg" style="height: 100%;" alt="Back">
                </button>
            </div>
            <div class="top-right-buttons" >
            </div>
        </div>
        <div id="paletteeditor-content">

            <div class="output-row">
                <input type="text" id="palette-url-preview" readonly>
                <button id="copyPaletteUrlBtn">
                    <img src="../image/copytoclipboard.svg" alt="Copy" style="height : 80%; width: 80%;">
                </button>
            </div>

            <div class="palette-row" style="display: none;">
                <input type="color" id="blackPenColor" value="#36364A" class="pen-background-input">
                <input type="color" id="backgroundColor" value="#F2EEE6" class="pen-background-input">
            </div>
            <div class="palette-row">
                <div id="paletteColors" class="color-list"></div>
            </div>


            <div class="output-row">
                <button id="applyRakugakiPaoBtn">▶ Start with this palette</button>
            </div>
        </div>
        <div id ="paletteSetListContainer">
            <div class="output-row">
                <div id="paletteSetList"></div>
            </div>
        </div>
    </div>

    <script>
        // 初期値
        const defaultColors = ["#FBA9A7", "#FAC48D", "#F9F19A", "#7BB07F", "#9DBEEA", "#D4C8F4", "#F0C6F0"];
        let blackPenColor = "#36364A";
        let backgroundColor = "#F2EEE6";
        let paletteColors;
        let changeableColor = "#C3C3C3";
        let paletteStr = '';
        const localstorageKeyPalette = 'palettecolorskey';

        // paletteColorsの初期値をlocalstorageKeyPaletteから読み込み
        (function(){
            let paletteStr = window.localStorage.getItem(localstorageKeyPalette);
            if(paletteStr){
                let [mainPart, palettePart, changeablePart] = paletteStr.split('|');
                let [bpc, bgc] = (mainPart || '').split(',');
                if(bpc) blackPenColor = bpc;
                if(bgc) backgroundColor = bgc;
                paletteColors = palettePart ? palettePart.split(',') : [...defaultColors];
                if(changeablePart) changeableColor = changeablePart;
            } else {
                paletteColors = [...defaultColors];
            }
        })();

        // 要素取得
        const backButton = document.getElementById('back');
        const blackPenColorInput = document.getElementById('blackPenColor');
        const backgroundColorInput = document.getElementById('backgroundColor');
        const paletteColorsDiv = document.getElementById('paletteColors');
        const addPaletteColorBtn = document.getElementById('addPaletteColor');
        const changeableColorInput = document.getElementById('changeableColor');
        const applyRakugakiPaoBtn = document.getElementById('applyRakugakiPaoBtn');
        const copyPaletteUrlBtn = document.getElementById('copyPaletteUrlBtn');
        const paletteSetList = document.getElementById('paletteSetList');
        const paletteSetListContainer = document.getElementById('paletteSetListContainer');
        const paletteEditorContent = document.getElementById('paletteeditor-content');
        const paletteSetStorageKey = 'paletteSetList';
        const paletteUrlPreview = document.getElementById('palette-url-preview');

        // ボタンイベントリスナー登録
        backButton.addEventListener('click', () => {
            location.href='../index.html';
        })

        // デフォルトパレットセット（URLエンコードされた文字列）
        const defaultPaletteSets = [
            "NjZK8u7m-.6mn.sSN.fGae7B_nb7q1Mj08Mbw-w8PD",
            "NjZK8u7m-_wAAAP8AAAD___8A_wD_AP__iIiI-7u7u",
            "NjZK8u7m-_9cA_4wA_2m0iiviAM7RIosi3BQ8-____",
            "NjZK8u7m-cUxLpJ6Yu7iVTH4.S153r2SIW3Zy-w8PD",
        ];



        // 初期描画
        
        loadPaletteFromUrl();
        syncInputs();
        updateAll();
        renderPaletteSetList();

        // パレットセットリスト取得
        function getPaletteSetList() {
            let list = JSON.parse(window.localStorage.getItem(paletteSetStorageKey) || '[]');
            if(list.length === 0) {
                list = [...defaultPaletteSets];
                window.localStorage.setItem(paletteSetStorageKey, JSON.stringify(list));
            }
            return list;
        }
        // パレットセットリスト保存
        function setPaletteSetList(list) {
            window.localStorage.setItem(paletteSetStorageKey, JSON.stringify(list));
        }
        // パレットセット追加
        function addPaletteSet(str) {
            let list = getPaletteSetList();
            list.push(encodePalette(str));
            setPaletteSetList(list);
            renderPaletteSetList();
        }
        // パレットセット削除
        function deletePaletteSet(idx) {
            let list = getPaletteSetList();
            list.splice(idx,1);
            setPaletteSetList(list);
            renderPaletteSetList();
        }
        // パレットセット反映
        function applyPaletteSet(str) {
            let [mainPart, palettePart, changeablePart] = str.split('|');
            let [bpc, bgc] = (mainPart || '').split(',');
            if(bpc) blackPenColor = bpc;
            if(bgc) backgroundColor = bgc;
            paletteColors = palettePart ? palettePart.split(',') : [...defaultColors];
            changeableColor = changeablePart || defaultChangeableColor;
            syncInputs();
            updateAll();
        }
        // パレットセットリスト描画
        function renderPaletteSetList() {
            let list = getPaletteSetList();
            paletteSetList.innerHTML = '';
            paletteSetList.style.display = 'flex';
            paletteSetList.style.flexWrap = 'wrap';
            list.forEach((encodedPaletteStr, idx) => {
                const div = document.createElement('div');
                div.className = 'palette-set-item';

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'palette-set-item-delete-btn';
                deleteBtn.style.border = 'none';
                deleteBtn.addEventListener('click', () => deletePaletteSet(idx));
                const deleteBtnIcon = document.createElement('img');
                deleteBtnIcon.src = '../image/delete.svg';
                deleteBtnIcon.alt = 'delete'; 
                deleteBtnIcon.style.width = '24px';
                deleteBtn.appendChild(deleteBtnIcon);

                // 色プレビュー
                const previewDiv = document.createElement('img');
                previewDiv.src = getPaletteImageUrl(encodedPaletteStr);
                previewDiv.className = 'palette-preview-div';
                previewDiv.addEventListener('click', () => applyPaletteSet(encodedPaletteStr));

                div.appendChild(previewDiv);
                div.appendChild(deleteBtn);
                paletteSetList.appendChild(div);
            });
            const addToListBtn = document.createElement('div');
            addToListBtn.textContent = '＋';
            addToListBtn.id = 'add-palette-set-btn';
            addToListBtn.className = 'palette-preview-div';
            addToListBtn.addEventListener('click', () => {
                addPaletteSet(paletteStr);
            });     
            paletteSetList.appendChild(addToListBtn);
        }

        // rakugaki_pao反映ボタン
        applyRakugakiPaoBtn.addEventListener('click', () => {
            applyRakugkiPao();
        });

        function applyRakugkiPao(){
            blackPenColor = blackPenColorInput.value;
            backgroundColor = backgroundColorInput.value;
            updateAll();
            window.localStorage.setItem(localstorageKeyPalette, paletteStr);
            window.location.href = '../';
            //alert('rakugaki_paoに反映しました');

        }

        // パレットURL生成
        function getPaletteUrl() {
            const url = `${location.origin}${location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1)}share.php?colors=${encodePalette(paletteStr)}`;
            return url;
        }
        // パレットプレビュー画像URL生成
        function getPaletteImageUrl(encodedPaletteStr) {
            //const url = `${location.origin}${location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1)}image?colors=${encodedPaletteStr}`;
            const url = `https://kurajo.ivory.ne.jp/rakugaki_pao/palette/image.cgi?colors=${encodedPaletteStr}`;
            return url;
        }
        // パレットURLプレビュー更新
        function updatePaletteUrlPreview(){
            const url = getPaletteUrl();
            paletteUrlPreview.value = url;
        }
        // パレットURLコピー
        copyPaletteUrlBtn.addEventListener('click', () => {
            const url = getPaletteUrl();
            navigator.clipboard.writeText(url);
            //alert('パレットURLをコピーしました');
        });

        function encodePalette(str) {
            return str.split('|').map(section => {
                // # を除去し、カンマで分割。空要素を除去
                const hexes = section.replace(/#/g, '').split(',').filter(h => h.length === 6);
                
                const bytes = new Uint8Array(hexes.length * 3);
                hexes.forEach((hex, idx) => {
                    for (let i = 0; i < 3; i++) {
                        bytes[idx * 3 + i] = parseInt(hex.substr(i * 2, 2), 16);
                    }
                });

                // Uint8ArrayからBase64へ変換 (URL安全な形式に置換)
                const binary = String.fromCharCode(...bytes);
                return btoa(binary)
                    .replace(/\+/g, '.')
                    .replace(/\//g, '_')
                    .replace(/=/g, ''); // 末尾のパディング = は不要なので除去
            }).join('-');
        }

        function decodePalette(encodedStr) {
            return encodedStr.split('-').map(part => {
                // Base64を復元
                let base64 = part.replace(/\./g, '+').replace(/_/g, '/');
                while (base64.length % 4) base64 += '=';
                
                let binary;
                try {
                    binary = atob(base64);
                } catch (e) {
                    return ''; // デコード失敗時は空を返す
                }

                const hexes = [];
                // 3バイト(24bit)揃っている時のみ色として抽出
                // 端数（1〜2バイト）はループの条件 i + 2 < binary.length で自動的に捨てられます
                for (let i = 0; i + 2 < binary.length; i += 3) {
                    const r = binary.charCodeAt(i).toString(16).padStart(2, '0');
                    const g = binary.charCodeAt(i + 1).toString(16).padStart(2, '0');
                    const b = binary.charCodeAt(i + 2).toString(16).padStart(2, '0');
                    hexes.push(`#${r}${g}${b}`.toUpperCase());
                }
                return hexes.join(',');
            }).join('|');
        }
        

        // --- テスト ---
        const encoded = encodePalette(paletteStr);
        console.log("Encoded:", encoded); 
        
        // URL引数paletteがあれば最優先で読み込む（要素取得後に実行）
        function loadPaletteFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const paletteParam = params.get('colors');
            if(paletteParam){
                let paletteStr = decodePalette(paletteParam);
                let [mainPart, palettePart, changeablePart] = paletteStr.split('|');
                let [bpc, bgc] = (mainPart || '').split(',');
                if(bpc) blackPenColor = bpc;
                if(bgc) backgroundColor = bgc;
                paletteColors = palettePart ? palettePart.split(',') : [...defaultColors];
                if(changeablePart) changeableColor = changeablePart;
            }
            syncInputs();
            updateAll();
        }

        // 色リスト描画
        function renderPaletteColors() {
            paletteColorsDiv.innerHTML = '';
            paletteEditorContent.style.backgroundColor = backgroundColor;
            paletteColors.forEach((color, idx) => {
                const item = document.createElement('div');
                item.className = 'color-item';
                const colorInput = document.createElement('input');
                colorInput.type = 'color';
                colorInput.value = color;
                colorInput.className = 'palette-input';
                colorInput.addEventListener('input', e => {
                    paletteColors[idx] = e.target.value;
                });
                colorInput.addEventListener('change', e => {
                    paletteColors[idx] = e.target.value;
                    updateAll();
                });
                // 並び替えボタン
                const leftBtn = document.createElement('button');
                leftBtn.textContent = '<';
                leftBtn.className = 'color-edit-btn';
                leftBtn.disabled = (idx === 0);
                leftBtn.addEventListener('click', () => {
                    if(idx > 0){
                        [paletteColors[idx-1], paletteColors[idx]] = [paletteColors[idx], paletteColors[idx-1]];
                        updateAll();
                    }
                });
                const rightBtn = document.createElement('button');
                rightBtn.textContent = '>';
                rightBtn.className = 'color-edit-btn';
                rightBtn.disabled = (idx === paletteColors.length-1);
                rightBtn.addEventListener('click', () => {
                    if(idx < paletteColors.length-1){
                        [paletteColors[idx+1], paletteColors[idx]] = [paletteColors[idx], paletteColors[idx+1]];
                        updateAll();
                    }
                });
                const removeBtn = document.createElement('button');
                removeBtn.className = 'color-edit-btn';
                //const removeBtnIcon = document.createElement('img');
                //removeBtnIcon.src = '../image/delete.svg';
                //removeBtnIcon.alt = 'delete'; 
                //removeBtnIcon.style.width = '16px';
                removeBtn.textContent = '-';
                //removeBtn.appendChild(removeBtnIcon);

                removeBtn.style.marginTop = '2px';
                removeBtn.addEventListener('click', () => {
                    paletteColors.splice(idx, 1);
                    updateAll();
                });
                item.appendChild(colorInput);
                item.appendChild(leftBtn);
                if (paletteColors.length > 1) item.appendChild(removeBtn);
                paletteColorsDiv.appendChild(item);
                item.appendChild(rightBtn);
                
            });

            const addPaletteColorBtn = document.createElement('button');
            addPaletteColorBtn.textContent = '+';
            addPaletteColorBtn.className = 'add-color-btn';
            addPaletteColorBtn.addEventListener('click', () => {
                if (paletteColors.length < 7) {
                    const used = new Set(paletteColors);
                    const candidate = defaultColors.find(c => !used.has(c));
                    paletteColors.push(candidate || '#FFFFFF');
                    updateAll();
                }
            });
            paletteColorsDiv.appendChild(addPaletteColorBtn);

            // 追加ボタン制御
            if(paletteColors.length >= 7){
                addPaletteColorBtn.style.display = 'none';
            } else {
                addPaletteColorBtn.style.display = 'inline-block';
            }


            // 変更可能色ボタン
            const changeableColorItem = document.createElement('div');
            changeableColorItem.className = 'color-item';
            const colorInput = document.createElement('input');
            colorInput.type = 'color';
            colorInput.value = changeableColor;
            colorInput.className = 'palette-input';
            colorInput.id = 'changeableColor';
            colorInput.addEventListener('input', e => {
                changeableColor = e.target.value;
            }); 
            colorInput.addEventListener('change', e => {
                changeableColor = e.target.value;
                updateAll();
            });
            changeableColorItem.appendChild(colorInput);
            paletteColorsDiv.appendChild(changeableColorItem)

        }

        // パレット色重複除去（後ろを消す）
        function mergePaletteColors() {
            let seen = new Set();
            paletteColors = paletteColors.filter((color, idx) => {
                if (seen.has(color)) return false;
                seen.add(color);
                return true;
            });
        }

        // 出力更新
        function updateAll() {
            mergePaletteColors();
            renderPaletteColors();
            paletteStr = `${blackPenColor},${backgroundColor}|${paletteColors.join(',')}|${changeableColor}`;
            updatePaletteUrlPreview();
        }

        // 入力イベント
        blackPenColorInput.addEventListener('input', e => {
            blackPenColor = e.target.value;
            updateAll();
        });
        backgroundColorInput.addEventListener('input', e => {
            backgroundColor = e.target.value;
            updateAll();
        });

        // 変数→input要素へ反映
        function syncInputs() {
            blackPenColorInput.value = blackPenColor;
            backgroundColorInput.value = backgroundColor;
        }

        // パレットセット反映
        function applyPaletteSet(encodedStr) {
            str = decodePalette(encodedStr);
            let [mainPart, palettePart, changeablePart] = str.split('|');
            let [bpc, bgc] = (mainPart || '').split(',');
            if(bpc) blackPenColor = bpc;
            if(bgc) backgroundColor = bgc;
            paletteColors = palettePart ? palettePart.split(',') : [...defaultColors];
            changeableColor = changeablePart || defaultChangeableColor;
            syncInputs();
            updateAll();
        }


    </script>
</body>
</html>
