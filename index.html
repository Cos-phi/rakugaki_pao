<!DOCTYPE html>
<html lang="ja">

    <title>rakugaki_pao</title>

<body>
    <div id="app">
        <div id="controls-top">
            <div class="top-left-buttons">
                <button id="clear" class="controls-top-button">
                    <img src="image/new.svg" style="height: 100%;" alt="Clear">
                </button>
                <button id="palette-edit" class="controls-top-button">
                    <img src="image/palette.svg" style="height: 100%;" alt="Palette Edit">
                </button>
                <button id="manual" class="controls-top-button">
                    <img src="image/manual.svg" style="height: 100%;" alt="Manual">
                </button>
            </div>

            <div class="top-right-buttons">
                <button id="copy-button" class="controls-top-button">
                    <img src="image/copytoclipboard.svg" style="height: 100%;" alt="Copy">
                </button>
                <button id="save-button" class="controls-top-button">
                    <img src="image/download.svg" style="height: 100%;" alt="Download">
                </button>
                <button id="share-button" class="controls-top-button" style="display: none;">
                    <img src="image/share.svg" style="height: 100%;" alt="Share">
                </button>
                <button id="timelapse-button" class="controls-top-button">
                    <img src="image/timelapse.svg" style="height: 100%;" alt="Timelapse">
                </button>
            </div>
        </div>
 
        <div id="canvas-container">
            <canvas id="background-layer"></canvas>
            <canvas id="color-layer"></canvas>
            <canvas id="active-stroke-layer"></canvas>
            <canvas id="black-layer"></canvas>
            <div id="cursor"></div>
        </div>

        <div id="controls_bottom">  
            <button id="undo-button" style="opacity: 0.3; pointer-events: none;">
                <img src="image/undo.svg" style="height: 100%;" alt="Undo">
            </button>
                     
            <input type="range" id="tool-size" min="0" max="7">
            <button id="black-pen-button" class="paint-tool-button">
                <img id="black-pen-icon" src="image/pen_w.svg" style="height: 100%;" alt="Pen">
            </button>
            <button id="black-eraser-button" class="paint-tool-button">
                <img id="black-eraser-icon" src="image/eraser.svg" style="height: 100%;" alt="Eraser">    
            </button>

            <div id="color-brush-buttons-container"></div>
            <button id="changeable-color-brush-button" class="color-brush-button"></button>
            <input id="palette" type="color">
            <button id="color-eraser-button" class="paint-tool-button">
                <img id="color-eraser-icon" src="image/eraser.svg" style="height: 100%;" alt="Eraser"> 
            </button>
             
            <input type="range" id="opacity" min="0.2" max="1" step="0.4" value="1">
        </div>

        <div id="logo-button-container">
            <button id="auth-button" class="logo-button">
                <img id="auth-button-img" style="height: 100%;" alt="Authentication" src="image/mistodon_disable.svg">
            </button>
            <button id="post-button" class="logo-button" style="display: none;">
                <img id="post-button-img" style="height: 100%;" alt="Post" src="image/mistodon.svg">
            </button>
            <button id="posting-dummy-button" class="logo-button" style="display: none;">
                <img id="posting-dummy-button-img" style="height: 100%;" alt="Posting.." src="image/mistodon_active.svg">
            </button>
        </div>

        <div id="hashtag-line">
            <button id="copy-hashtag" class="copy-hashtag-button">
                <span id="hashtag-text">#rakugaki_pao</span>
                <img src="image/copytoclipboard.svg" class="icon" alt="Copy hashtag">
            </button>
        </div>   
        
        <div id="message-line"></div>
        
        <div id="progress-bar-line">
            <progress id="progress-bar"></progress>
        </div>
    </div>

    <div id="post-dialog-modal" class="modal"  style="display: none;"> <!-- none -->
        <div class="modal-content">
            <div class="dialog-title-container">
                <button id="close-post-dialog-button" class="close-dialog-button">×</button>
                <button id="destination-server-reset-button"></button>
            </div>
            <div class="preview-img-container">

            </div>
            <textarea id="comment-textarea" rows="3" maxlength="483"></textarea>
            <div class="select-container">
                <select id="visibility-select">
                    <option value="public">🌐</option>
                    <option value="unlisted">🌙</option>
                    <option value="private">🔒</option>
                    <option value="direct">✉️</option>
                </select>
                <input type="checkbox" id="is-sensitive-checkbox">
                <label for="is-sensitive-checkbox" class="checkbox-label">⚠️</label>
                <input type="checkbox" id="add-url-checkbox">
                <label for="add-url-checkbox" class="checkbox-label">🔗</label>
                <button id="submit-button" class="submit-button"></button>   
            </div>
        </div>
    </div>

    <div id="timelapse-dialog-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="dialog-title-container">
                <button id="close-timelapse-dialog-button" class="close-dialog-button">×</button>
            </div>
            <div class="timelapse-info-container" style="display: none;">
                <span id="timelapse-frame-count">0</span> strokes / 
                <span id="timelapse-elapsed-time">0 min</span>
            </div>
            <div id="timelapse-preview-container">
                <canvas id="timelapse-preview-canvas" width="360" height="480"></canvas>
            </div>
            <div id="timelapse-progress-line" style="margin-top:12px; visibility:hidden;">
                <progress id="timelapse-progress-bar" value="0" max="100" style="width:100%;"></progress>
            </div>
            <div class="select-container" style="margin-top:12px; gap:8px; align-items:center;">
                <span class="timelapse-text">Speed: </span>
                <select id="timelapse-fps-select">
                    <option value="15" selected>15 fps</option>
                    <option value="30">30 fps</option>
                    <option value="60">60 fps</option>
                </select>
                <span class="timelapse-text">Est. Time:</span>
                <span id="timelapse-estimated-duration">0:00</span>
                <button id="timelapse-export-button" class="submit-button" style="margin-left:auto;">Export</button>
            </div>
        </div>
    </div>
    
    <div id="destination-server-setting-dialog-modal" class="modal"  style="display: none;"> <!-- none -->
        <div class="modal-content">
            <div class="dialog-title-container">
                <button id="close-destination-server-dialog-button" class="close-dialog-button">×</button>
            </div>
            <div class="select-container">

                <button id="destination-server-auth-button" class="desitination-server-auth-button">✔</button>   
            </div>
        </div>
    </div>

        // 関数

        // 描画に関する関数
        function startDrawing(x, y) {
            isDrawing = true;
            [lastX, lastY] = [x, y];
            [beforeLastX,beforeLastY] = [x,y]
            if (isWaitingFirstStroke){
                onFirstStrokeDetected();
            }
            saveState();
            stipple(x,y);
        }

        function draw(x, y) {
            if (!isDrawing) return;
            if (isEraser) {
                ctxCurrentLayer.beginPath();
                ctxCurrentLayer.moveTo(lastX, lastY);
                ctxCurrentLayer.lineTo(x, y);
                ctxCurrentLayer.globalCompositeOperation = 'destination-out';
                ctxCurrentLayer.strokeStyle = currentColor;
                ctxCurrentLayer.lineWidth = toolDiameter;
                ctxCurrentLayer.lineCap = 'round';
                ctxCurrentLayer.stroke();
            }else { 
                ctxActiveStroke.beginPath();
                ctxActiveStroke.moveTo(lastX, lastY);

                const travelSquared = (x-lastX)**2 + (y-lastY)**2;
                if(64 < travelSquared){
                    const [xM,yM] = [lastX + (x - beforeLastX)/4, lastY + (y - beforeLastY)/4]; 
                    ctxActiveStroke.lineTo(xM, yM); // 移動量が多いとき、補間点を作って経由します
                    [lastX,lastY] = [xM,yM];
                }else if( ctxCurrentLayer === ctxBlack ){
                    x = x*(1-smoothingFactor) + lastX*smoothingFactor;
                    y = y*(1-smoothingFactor) + lastY*smoothingFactor;
                }
                ctxActiveStroke.lineTo(x, y);
                ctxActiveStroke.globalCompositeOperation = 'source-over';
                ctxActiveStroke.strokeStyle = currentColor;
                ctxActiveStroke.lineWidth = toolDiameter;
                ctxActiveStroke.lineCap = 'round';
                ctxActiveStroke.lineJoin = 'round';
                ctxActiveStroke.stroke();
            }
            [beforeLastX,beforeLastY] = [lastX,lastY];
            [lastX, lastY] = [x, y];
        }

        function stipple(x,y){
            if (isEraser) {
                ctxCurrentLayer.beginPath();
                ctxCurrentLayer.moveTo(x, y);
                ctxCurrentLayer.globalCompositeOperation = 'destination-out';
                ctxCurrentLayer.strokeStyle = currentColor;
                ctxCurrentLayer.fillStyle = currentColor;
                ctxCurrentLayer.arc(x,y, toolDiameter*0.5, 0, 2*Math.PI, true);
                ctxCurrentLayer.closePath();
                ctxCurrentLayer.fill();
            }else{    
                ctxActiveStroke.beginPath();
                ctxActiveStroke.moveTo(x, y);
                ctxActiveStroke.globalCompositeOperation = 'source-over';
                ctxActiveStroke.strokeStyle = currentColor;
                ctxActiveStroke.fillStyle = currentColor;
                ctxActiveStroke.arc(x,y, toolDiameter*0.5, 0, 2*Math.PI, true);
                ctxActiveStroke.closePath();
                ctxActiveStroke.fill();
            }
        }

        function touchToOffsetXY(e) {
            const target = e.touches[0].target;

            return [e.touches[0].clientX - r.left, e.touches[0].clientY - r.top];
        }

        function startDrawingTouch(e) {

        // ローカルストレージへの絵の保存・読込に関する関数
        function saveLocalstorage() {

        function loadImageFromDataURL(dataURL) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = (e) => reject(e);
                img.src = dataURL;
            });
        }   

        async function restoreLayerOnLocalstorage() {
            // レイヤー画像の復元
            const restoreLayerAsync = async (localstoragekey, layer) => {
                const dataURL = window.localStorage.getItem(localstoragekey);
                if (dataURL == null) return;

                try {
                    const img = await loadImageFromDataURL(dataURL);
                    const ctx = layer.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                } catch (e) {
                    console.error(`Failed to restore layer for ${localstoragekey}`, e);
                }
            };

            try {
                await Promise.all([
                    restoreLayerAsync(localstorageKeyBlack, blackLayer),
                    restoreLayerAsync(localstorageKeyColor, colorLayer)
                ]);
                if (isCanvasEmpty()) {  // レイヤー復元後にキャンバスが空かどうか判定
                    resetFirstStrokeState();
                }
            } catch (e) {
                console.error('Layer restoration failed', e);
            }
        }

        function openTimelapseDb(){
            return new Promise((resolve, reject) => {
                if (timelapseDb) return resolve(timelapseDb);
                const request = window.indexedDB.open('rakugaki_pao_timelapse', 1);
                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains('frames')) {
                        const store = db.createObjectStore('frames', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp');
                    }
                };
                request.onsuccess = () => {
                    timelapseDb = request.result;
                    resolve(timelapseDb);
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function initializeTimelapseStorage(){

            }

        function clearTimelapseFrames(){
            return new Promise(async (resolve, reject) => {
                try {
                    const db = await openTimelapseDb();
                    const tx = db.transaction('frames','readwrite');
                    const store = tx.objectStore('frames');
                    const request = store.clear();
                    request.onsuccess = () => {
                        timelapseFrameCount = 0;
                        updateTimelapseLabels();
                        updateTimelapseEstimatedDuration();
                        resolve();
                    };
                    request.onerror = () => reject(request.error);
                } catch (e) {
                    reject(e);
                }
            });
        }

        function saveTimelapseFrame(blob, elapsedTimeSec){
            return new Promise(async (resolve, reject) => {
                try {
                    const db = await openTimelapseDb();
                    const tx = db.transaction('frames','readwrite');
                    const store = tx.objectStore('frames');
                    const data = {
                        blob,
                        elapsedTimeSec,
                        timestamp: Date.now()
                    };
                    const request = store.add(data);
                    request.onsuccess = () => {
                        timelapseFrameCount += 1;
                        updateTimelapseLabels();
                        updateTimelapseEstimatedDuration();
                        resolve();
                    };
                    request.onerror = () => reject(request.error);
                } catch (e) {
                    reject(e);
                }
            });
        }

        function getTimelapseFrameCount(){
            return new Promise(async (resolve, reject) => {
                try {
                    const db = await openTimelapseDb();
                    const tx = db.transaction('frames','readonly');
                    const store = tx.objectStore('frames');
                    const request = store.count();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                } catch (e) {
                    reject(e);
                }
            });
        }

        function canvasToBlob(canvas, type, quality){
            return new Promise(resolve => canvas.toBlob(resolve, type, quality));

        async function captureTimelapseFrame(){
            if (isWaitingFirstStroke) return;
            combineCanvas();
            let blob = await canvasToBlob(combinedCanvas, 'image/webp', 1.0);
            if (!blob) {
                blob = await canvasToBlob(combinedCanvas, 'image/png');

            if (!blob) return;
            const elapsedTimeSec = getElapsedTimeSecFromFirstStrokeTime();
            try {

        function getTimelapseFrames(){
            return new Promise(async (resolve, reject) => {
                try {
                    const db = await openTimelapseDb();
                    const tx = db.transaction('frames','readonly');
                    const store = tx.objectStore('frames');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result.sort((a,b) => a.id - b.id));
                    request.onerror = () => reject(request.error);
                } catch (e) {
                    reject(e);
                }
            });
        }

        function makeTimelapseFileName(mimeType){
            const nowTime = new Date();
            const timeString = nowTime.toLocaleString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replaceAll('/','').replaceAll(':','').replaceAll(' ','-');
            const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
            return `${timeString}_rakugaki_pao_timelapse(${timelapseFrameCount}strokes).${ext}`;
        }

        function downloadBlob(blob, filename){
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 2000);
        }

        async function exportTimelapseVideo(fps, onProgress, previewCanvas = null){
            const frames = await getTimelapseFrames();
            if (frames.length === 0) throw new Error('No timelapse frames to export');
            const width = canvasWidth;
            const height = 960;
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = width;
            exportCanvas.height = height;
            const exportCtx = exportCanvas.getContext('2d');
            const previewCtx = previewCanvas ? previewCanvas.getContext('2d') : null;
            const stream = exportCanvas.captureStream(fps);
            const mimeType = getExportMimeType();
            const recorder = new MediaRecorder(stream, { mimeType });
            const chunks = [];
            recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
            const recorderPromise = new Promise((resolve, reject) => {
                recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType }));
                recorder.onerror = event => reject(event.error || new Error('MediaRecorder error'));
            });
            recorder.start();
            await sleep(100);
            const totalFrames = Math.ceil(0.5*fps) + Math.ceil(0.25*fps)*4 + frames.length + Math.ceil(2*fps);
            let emitted = 0;
            const finalBitmap = await buildFinalFrameBitmap();
            const firstFrameBitmap = await createImageBitmap(frames[0].blob);
            const lastFrameBitmap = await createImageBitmap(frames[frames.length - 1].blob);
            const progressStep = 100 / totalFrames;
            const updateProgress = () => onProgress(Math.round(emitted * progressStep));
            const finalElapsedTimeSec = frames[frames.length - 1].elapsedTimeSec;
            for (let i = 0; i < Math.ceil(0.5*fps); i++) {
                drawExportFrame(exportCtx, finalBitmap, width, height, timelapseFrameCount, finalElapsedTimeSec);
                if (previewCtx) drawPreviewFrameWithDetails(previewCtx, finalBitmap, timelapseFrameCount, finalElapsedTimeSec);
                await sleep(1000/fps);
                emitted++;
                updateProgress();
            }
            await renderFade(exportCtx, finalBitmap, null, 0.25, fps, '#F0F0F0', false, (count) => { emitted += count; updateProgress(); }, timelapseFrameCount, finalElapsedTimeSec, previewCtx);
            await renderFade(exportCtx, null, firstFrameBitmap, 0.25, fps, '#F0F0F0', true, (count) => { emitted += count; updateProgress(); }, 1, frames[0].elapsedTimeSec, previewCtx);
            for (let index = 0; index < frames.length; index++) {
                const frame = frames[index];
                const bitmap = await createImageBitmap(frame.blob);
                drawExportFrame(exportCtx, bitmap, width, height, index + 1, frame.elapsedTimeSec);
                if (previewCtx) drawPreviewFrameWithDetails(previewCtx, bitmap, index + 1, frame.elapsedTimeSec);
                bitmap.close();
                await sleep(1000/fps);
                emitted++;
                updateProgress();
            }
            await renderFade(exportCtx, lastFrameBitmap, null, 0.25, fps, '#000000', false, (count) => { emitted += count; updateProgress(); }, frames.length, frames[frames.length - 1].elapsedTimeSec, previewCtx);
            await renderFade(exportCtx, null, finalBitmap, 0.25, fps, '#000000', true, (count) => { emitted += count; updateProgress(); }, timelapseFrameCount, frames[frames.length - 1].elapsedTimeSec, previewCtx);
            for (let i = 0; i < Math.ceil(2*fps); i++) {
                drawExportFrame(exportCtx, finalBitmap, width, height, timelapseFrameCount, frames[frames.length - 1].elapsedTimeSec);
                if (previewCtx) drawPreviewFrameWithDetails(previewCtx, finalBitmap, timelapseFrameCount, frames[frames.length - 1].elapsedTimeSec);
                await sleep(1000/fps);
                emitted++;
                updateProgress();
            }
            recorder.stop();
            finalBitmap.close();
            firstFrameBitmap.close();
            lastFrameBitmap.close();
            return recorderPromise;
        }

        function getExportMimeType(){
            if (MediaRecorder.isTypeSupported('video/mp4')) return 'video/mp4';
            if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) return 'video/webm;codecs=vp9';
            if (MediaRecorder.isTypeSupported('video/webm')) return 'video/webm';
            throw new Error('No supported export mime type');
        }

        async function buildFinalFrameBitmap(){
            combineCanvas();
            const blob = await new Promise(resolve => combinedCanvas.toBlob(resolve, 'image/png'));
            return await createImageBitmap(blob);
        }

        async function renderFade(ctx, fromBitmap, toBitmap, duration, fps, background, fadeIn, progressCallback, frameCount, elapsedTimeSec, previewCtx = null){
            const frameTotal = Math.ceil(duration * fps);
            for (let index = 0; index < frameTotal; index++) {
                const progress = (index + 1) / frameTotal;
                ctx.fillStyle = background;
                ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                if (previewCtx) {
                    previewCtx.fillStyle = background;
                    previewCtx.fillRect(0, 0, previewCtx.canvas.width, previewCtx.canvas.height);
                }
                if (fromBitmap && !fadeIn) {
                    drawExportFrame(ctx, fromBitmap, ctx.canvas.width, ctx.canvas.height, frameCount, elapsedTimeSec, 1 - progress);
                    if (previewCtx) drawPreviewFrameWithDetails(previewCtx, fromBitmap, frameCount, elapsedTimeSec, 1 - progress);
                }
                if (toBitmap && fadeIn) {
                    drawExportFrame(ctx, toBitmap, ctx.canvas.width, ctx.canvas.height, frameCount, elapsedTimeSec, progress);
                    if (previewCtx) drawPreviewFrameWithDetails(previewCtx, toBitmap, frameCount, elapsedTimeSec, progress);
                }
                await sleep(1000/fps);
                progressCallback(1);
            }
        }

        function drawExportFrame(ctx, bitmap, width, height, frameCount, elapsedTimeSec, alpha = 1){
            ctx.save();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#F0F0F0';
            ctx.fillRect(0, 0, width, height);
            ctx.globalAlpha = alpha;
            const canvasTop = 120;
            ctx.drawImage(bitmap, 0, canvasTop, canvasWidth, canvasHeight);
            drawExportTopText(ctx, width, canvasTop, frameCount, elapsedTimeSec);
            drawExportBottomText(ctx, width, canvasTop + canvasHeight + 48);
            ctx.restore();
        }

        function drawExportTopText(ctx, width, topHeight, frameCount, elapsedTimeSec){
            ctx.save();
            ctx.font = '24px "Yu Gothic UI", sans-serif';
            ctx.fillStyle = '#AAAAAA';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            const framesText = String(frameCount).padStart(4, ' ');
            let timeText;
            if (elapsedTimeSec < 60) {
                timeText = `${String(elapsedTimeSec).padStart(2, ' ')} sec`;
            } else {
                const minutes = Math.trunc(elapsedTimeSec / 60);
                timeText = `${String(minutes).padStart(2, ' ')} min`;
            }
            const topText = `${framesText} strokes / ${timeText}`;
            ctx.fillText(topText, width/2, topHeight - 16);
            ctx.restore();
        }

        function drawExportBottomText(ctx, width, baseline){
            ctx.save();
            ctx.fillStyle = '#AAAAAA';
            ctx.font = '28px "Yu Gothic UI", sans-serif';
            ctx.textBaseline = 'alphabetic';
            const text = '#rakugaki_pao';
            const letterSpacing = 6;
            const totalWidth = ctx.measureText(text).width + letterSpacing * (text.length - 1);
            let x = width/2 - totalWidth/2;
            for (const char of text) {
                ctx.fillText(char, x, baseline);
                x += ctx.measureText(char).width + letterSpacing;
            }
            ctx.restore();
        }

        function drawPreviewFrame(ctx, bitmap, alpha = 1){
            if (!ctx || !bitmap) return;
            ctx.save();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#F0F0F0';
            ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.globalAlpha = alpha;
            // Draw the bitmap scaled to fit the preview canvas (360x360)
            ctx.drawImage(bitmap, 0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.restore();
        }

        function drawPreviewFrameWithDetails(ctx, bitmap, frameCount, elapsedTimeSec, alpha = 1){
            if (!ctx || !bitmap) return;
            
            const width = ctx.canvas.width;   // 360
            const height = ctx.canvas.height; // 480
            const scale = width / 720;        // 0.5
            
            ctx.save();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#F0F0F0';
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalAlpha = alpha;
            
            // スケーリングして画像を描画
            const canvasTop = (height - 720 * scale) / 2;     // 60
            const canvasSize = 720 * scale;                    // 360
            ctx.drawImage(bitmap, 0, canvasTop, canvasSize, canvasSize);
            
            // テキスト描画
            drawPreviewTopText(ctx, width, canvasTop, frameCount, elapsedTimeSec, scale);
            drawPreviewBottomText(ctx, width, canvasTop + canvasSize + 60 * scale, scale);
            
            ctx.restore();
        }

        function drawPreviewTopText(ctx, width, topHeight, frameCount, elapsedTimeSec, scale){
            ctx.save();
            ctx.font = `${Math.round(24 * scale)}px "Yu Gothic UI", sans-serif`;
            ctx.fillStyle = '#AAAAAA';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            const framesText = String(frameCount).padStart(4, ' ');
            let timeText;
            if (elapsedTimeSec < 60) {
                timeText = `${String(Math.floor(elapsedTimeSec)).padStart(2, ' ')} sec`;
            } else {
                const minutes = Math.trunc(elapsedTimeSec / 60);
                timeText = `${String(minutes).padStart(2, ' ')} min`;
            }
            const topText = `${framesText} strokes / ${timeText}`;
            ctx.fillText(topText, width/2, topHeight - 16 * scale);
            ctx.restore();
        }

        function drawPreviewBottomText(ctx, width, baseline, scale){
            ctx.save();
            ctx.fillStyle = '#AAAAAA';
            ctx.font = `${Math.round(28 * scale)}px "Yu Gothic UI", sans-serif`;
            ctx.textBaseline = 'alphabetic';
            const text = '#rakugaki_pao';
            const letterSpacing = 6 * scale;
            const totalWidth = ctx.measureText(text).width + letterSpacing * (text.length - 1);
            let x = width/2 - totalWidth/2;
            for (const char of text) {
                ctx.fillText(char, x, baseline);
                x += ctx.measureText(char).width + letterSpacing;
            }
            ctx.restore();
        }

        // Undo機能に関する関数
        function saveState() {
            saveStateUnlimited();

        function saveStateUnlimited() {
            undoStack.push({
                black: ctxBlack.getImageData(0, 0, blackLayer.width, blackLayer.height),
                color: ctxColor.getImageData(0, 0, colorLayer.width, colorLayer.height),
                firstStrokeTime: window.localStorage.getItem(localstorageKeyFirstStrokeTime),
                lastStrokeTime: window.localStorage.getItem(localstorageKeyLastStrokeTime),
                isWaitingFirstStroke
            });
            activateUndoButton();
        }
 
        function undo() {
            if (undoStack.length === 0) return;
            const state = undoStack.pop();
            ctxBlack.putImageData(state.black, 0, 0);
            ctxColor.putImageData(state.color, 0, 0);
            if (state.firstStrokeTime != null) {
                window.localStorage.setItem(localstorageKeyFirstStrokeTime, state.firstStrokeTime);
                if (state.lastStrokeTime != null) {
                    window.localStorage.setItem(localstorageKeyLastStrokeTime, state.lastStrokeTime);
                } else {
                    window.localStorage.removeItem(localstorageKeyLastStrokeTime);
                }
                isWaitingFirstStroke = state.isWaitingFirstStroke;
            } else {
                resetFirstStrokeState();
            }
            if (undoStack.length === 0) {
                disactivateUndoButton();
            }
        }

        function activateUndoButton() {

        function getElapsedTimeMinFromFirstStrokeTime(){
            const firstStrokeTime = window.localStorage.getItem(localstorageKeyFirstStrokeTime);
            const lastStrokeTime = window.localStorage.getItem(localstorageKeyLastStrokeTime);
            if (firstStrokeTime == null) return 0;
            const endTime = lastStrokeTime != null ? Number(lastStrokeTime) : new Date().getTime();
            const elapsedTimeMin = Math.trunc((endTime - Number(firstStrokeTime))/1000/60);
            return elapsedTimeMin;
        }

        function getElapsedTimeSecFromFirstStrokeTime(){
            const firstStrokeTime = window.localStorage.getItem(localstorageKeyFirstStrokeTime);
            const lastStrokeTime = window.localStorage.getItem(localstorageKeyLastStrokeTime);
            if (firstStrokeTime == null) return 0;
            const endTime = lastStrokeTime != null ? Number(lastStrokeTime) : new Date().getTime();
            const elapsedTimeSec = Math.trunc((endTime - Number(firstStrokeTime))/1000);
            return elapsedTimeSec;
        }
        
        function showElapsedTimeFromFirstStrokeTime(){
            const elapsedTimeMin = getElapsedTimeMinFromFirstStrokeTime();
            const sec = getElapsedTimeSecFromFirstStrokeTime() - elapsedTimeMin * 60;

                showMessage(currentTranslations.messages.noDrawing);

            const blackData = ctxBlack.getImageData(0,0,blackLayer.width, blackLayer.height).data;

            for(let i=0; i<blackData.length; i++){

                    return false;
                }
            }
            for(let i=0; i<colorData.length; i++){

                }
            }

        function dataURLToBlob(dataURL) {
            const parts = dataURL.split(';base64,');
            const contentType = parts[0].split(':')[1];
            const raw = window.atob(parts[1]);
            const rawLength = raw.length;
            const uInt8Array = new Uint8Array(rawLength);
            for (let i = 0; i < rawLength; ++i) {
                uInt8Array[i] = raw.charCodeAt(i);
            }
            return new Blob([uInt8Array], { type: contentType });
        }

        // ハッシュタグのコピーに関する関数
        function copyHastag() {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(hashtag).then(function () {
                    showMessage(currentTranslations.messages.hashtagCopied);
                }).catch(function (error) {
                    console.error('ハッシュタグのコピーに失敗しました:', error);
                    alert('ハッシュタグのコピーに失敗しましたの / Failed to copy hashtag');
                });
            } else {
                alert('テキストをコピーできませんの / Cannot copy text');
            }
        }
        
        // 下部情報表示に関する関数
        function showMessage(text) {
            showMessage.queue = showMessage.queue || [];
            showMessage.queue.push(text);
            
            async function processQueue() {
                while (showMessage.queue.length > 0) {
                    const message = showMessage.queue.shift();
                    await new Promise((resolve) => {   
                        messageLine.style.display = 'flex';
                        hashtagLine.style.display = 'none';
                        messageLine.textContent = message; 
                        
                        setTimeout(() => {
                            messageLine.style.display = 'none';
                            hashtagLine.style.display = 'flex';
                            resolve();
                        }, 1800);
                    });
                }
            }
            if (!showMessage.isProcessing) {
                showMessage.isProcessing = true;
                processQueue().then(() => {
                    showMessage.isProcessing = false;
                });
            }
        }

        function activatePostingProgressBar(){
            progressBar.style.visibility = 'visible';
            postButton.style.display = 'none';
            postingDummyButton.style.display = '';
        }
        
        function deactivatePostingProgressBar(){
            progressBar.style.visibility = 'hidden';
            postButton.style.display = '';
            postingDummyButton.style.display = 'none';
        }

        // 投稿ダイアログ
        function openPostDialog() {
            showElapsedTimeFromFirstStrokeTime();
            combineCanvas();    
            const dataURL = combinedCanvas.toDataURL('image/png');
            previewImg.src = dataURL;
            postDialogModal.style.display = 'block';
        }

        function initializePostDialog() {
            visibilitySelect.value = defaultSettings.publishingLevel;
            isSensitiveCheckbox.checked = defaultSettings.isSensitive;
            addUrlCheckbox.checked = false;
            commentTextarea.value = defaultSettings.postComment;
            toggleSensitiveBlur();
        }

        function toggleAddUrl() {
            if (addUrlCheckbox.checked) {
                commentTextarea.value = shareUrl + "\n" + commentTextarea.value;
            } else {
                commentTextarea.value = commentTextarea.value.replace(shareUrl+"\n", '');
            }
        }

        function toggleSensitiveBlur() {
            if (isSensitiveCheckbox.checked) {
                previewImg.style.filter = 'blur(16px)';
            } else {
                previewImg.style.filter = 'none';
            }
        }

        function savePostSetting() {
            publishingLevel = visibilitySelect.value;
            isSensitive = isSensitiveCheckbox.checked;
            postComment = commentTextarea.value.trim() || defaultSettings.postComment;
        }

        // 投稿先選択ダイアログ
        function openDestinationServerSettingDialog() {
            closeDialog();
            populateDestinationServerSelect();
            destinationServerSettingDialogModal.style.display = 'block';
        }

        function populateDestinationServerSelect() { // サーバーリストをselectに反映
            destinationServerSelect.innerHTML = ''; // 既存のオプションをクリア
            for (const key in serverData) {
                if (serverData.hasOwnProperty(key)) {
                    const server = serverData[key];
                    const option = document.createElement("option");
                    option.value = key;
                    let label = key;
                    // if (server.app_type === "misskey") label += " (Misskey)";
                    // if (server.app_type === "mastodon" || server.app_type === "mistodon") label += " (Mastodon)";
                    option.textContent = label;
                    destinationServerSelect.appendChild(option);
                }
            }
        }

        function authDestinationServer() {
            const newServerName = destinationServerSelect.value;
            const newAppInfo = serverData[newServerName];
            
            app_info = newAppInfo;
            hostName = app_info.hostname;
            serverUrl = "https://" + hostName;
            window.localStorage.setItem(localstorageKeyDestinationServerName,destinationServerSelect.value);
            window.localStorage.removeItem(localstorageKeyAccessToken);
            if (window.localStorage.getItem(localstorageKeyMisskeyAccessTokenPrefix + hostName) != null) {
                reloadPage();
            } else if (app_info.app_type === "misskey") {
                startMiAuth();
            } else {
                getAuthCodeRedirect();
            }
        }

        // 投稿先追加ダイアログ
        function openAddDestinationServerDialog() {
            closeDialog();
            addDestinationServerDialogModal.style.display = 'block';
        }

        async function authAddDestinationServer() {
            addAuthDestinationServerButton.disabled = true;
            const inputUrlString = normalizeUrl(destinationServerUrlInput.value);
            let newUrl;
            try {
                newUrl = new URL(inputUrlString);
            } catch (e) {
                alert('Misskeyサーバーの URL を入力してくださいまし。 / Please input Misskey server URL');
                addAuthDestinationServerButton.disabled = false;
                return; 
            }
            const isMisskey = await isMisskeyUrl(newUrl.origin);
            if (isMisskey) {
                console.log('Misskey server!');
                window.localStorage.setItem(localstorageKeyDestinationServerName,newUrl.hostname);
                window.localStorage.removeItem(localstorageKeyAccessToken);
                serverUrl = newUrl.origin;     
                if (window.localStorage.getItem(localstorageKeyMisskeyAccessTokenPrefix + newUrl.hostname) != null) {
                    reloadPage();
                }else{       
                    startMiAuth();
                }
            }else{
                alert('このURLはMisskeyサーバーではないみたいですの。MisskeyサーバーのURLを入力してくださいまし。/ True URL is not Misskey server. Please input Misskey server URL.');
                addAuthDestinationServerButton.disabled = false;
                return;
            }
        }

        async function isMisskeyUrl(url) {
            const apiMetaUrl = `${url}/api/meta`;
            try {
                const response = await fetch(apiMetaUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: "{}"
                });
                if (!response.ok) return false;
                const data = await response.json();
                const misskeyKeys = ["version", "name", "features"];
                const hitCount = misskeyKeys.filter(key => key in data).length;
                return hitCount >= 2;   // Misskey 固有のキーが複数存在していれば Misskey と判定
            } catch (e) {
                return false; // fetch 失敗 → Misskey でない
            }
        }
        
        function normalizeUrl(input) {
            if (input.startsWith("https://")) {
                return inpu.trim();
            }
            return "https://" + input.trim();
        }


        // ダイアログ共通
        function closeDialog() {
            for (let i = 0; i < modals.length; i++) {
                modals[i].style.display = 'none'; 
            }
        }

        function initializeModal(){
            for (let i = 0; i < modals.length; i++) {
                // modals[i].style.display = 'none'; // 各要素を非表示にする
                modals[i].addEventListener('click', (event) => {
                    if (event.target === modals[i]) {
                        closeDialog();
                    }
                });
            }
        }

        // 投稿処理
        function postToDestinationServer() {
            savePostSetting();
            combineCanvas();
            const dataURL = combinedCanvas.toDataURL('image/png');
            if (app_info.app_type === "misskey") {
                postImageToMisskey(dataURL, accessToken);
            } else {
                postImage(dataURL, accessToken);
            }
        }

        function postImage(dataURL, accessToken) {
            setOutputFileName();
            activatePostingProgressBar();
            closeDialog();
            showElapsedTimeFromFirstStrokeTime();
            fetch(`${serverUrl}/api/v1/media`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                    },
                    body: (() => {
                        const formData = new FormData();
                        formData.append('file', dataURLToBlob(dataURL), outputFileName);
                        return formData;
                    })()
            })
            .then(response => { 
                if (!response.ok) {
                    accessToken = null;
                    window.localStorage.removeItem(localstorageKeyAccessToken);
                    throw "PostError";
                }
                return response.json()
            })
            .then(data => {
                return fetch(`${serverUrl}/api/v1/statuses`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        status: postComment,
                        media_ids: [data.id],
                        visibility: publishingLevel,
                        sensitive: isSensitive,
                    }),
                });
            })
            .then(() => {
                deactivatePostingProgressBar();
                setTimeout(() => {
                    showMessage(currentTranslations.messages.postedSuccess)
                    showElapsedTimeFromFirstStrokeTime();
                    initializePostDialog();
                }, 100);
                
            })
            .catch(error => {
                if (error == "PostError")
                {
                    deactivatePostingProgressBar();
                    alert("ポストエラーですの。トークンが駄目みたいですのでcodeを取り直しますわ。もう一度ポストしてみてくださいね。 / Post error. Token is invalid. Please try posting again after re-authentication.");
                    getAuthCodeRedirect();
                }
                else
                {
                    deactivatePostingProgressBar();
                    console.error('Error:', error);
                    alert('投稿中によくわからないエラーが発生しましたの‥‥ / An unknown error occurred while posting');
                }
            });
        }
        function postImageToMisskey(dataURL, accessToken) {
            setOutputFileName();
            activatePostingProgressBar();
            closeDialog();
            showElapsedTimeFromFirstStrokeTime();

            // 画像アップロード
            fetch(`${serverUrl}/api/drive/files/create`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}` },
                body: (() => {
                    const formData = new FormData();
                    formData.append('file', dataURLToBlob(dataURL), outputFileName);
                    formData.append('isSensitive', isSensitive);
                    return formData;
                })()
            })
            .then(res => {
                if (!res.ok) {
                    if (res.status === 401) throw { type: "MisskeyAuthError" };
                    return res.json().then(err => { throw err; });
                }
                return res.json();
            })
            .then(file => {
                // ノート投稿
                return fetch(`${serverUrl}/api/notes/create`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: postComment,
                        fileIds: [file.id],
                        visibility: convertVisibilityForMisskey(publishingLevel),
                        // cw: CWFLAG ? "CW message" : undefined
                    })
                });
            })
            .then(res => {
                if (!res.ok) {
                    if (res.status === 401) throw { type: "MisskeyAuthError" };
                    return res.json().then(err => { throw err; });
                }
                return res.json();
            })
            .then(() => {
                deactivatePostingProgressBar();
                setTimeout(() => {
                    showMessage(currentTranslations.messages.postedSuccess);
                    showElapsedTimeFromFirstStrokeTime();
                    initializePostDialog();
                }, 100);
            })
            .catch(async error => {
                deactivatePostingProgressBar();
                if (error.type === "MisskeyAuthError") {
                    // アクセストークン無効時の処理
                    accessToken = null;
                    window.localStorage.removeItem(localstorageKeyMisskeyAccessToken);
                    authButton.style.display = '';
                    postButton.style.display = 'none';
                    showMessage(currentTranslations.messages.misskeyAuthError);
                } else if (error instanceof Response) {
                    const errJson = await error.json();
                    alert('Misskey投稿中にエラー: ' + JSON.stringify(errJson) + ' / Error during Misskey post: ' + JSON.stringify(errJson));
                    console.error(errJson);
                } else {
                    alert('Misskey投稿中にエラーが発生しました / An error occurred during Misskey post');
                    console.error(error);
                }
            });
        }

        function convertVisibilityForMisskey(mastodonVisibility) {
            switch (mastodonVisibility) {
                case "public": return "public";
                case "unlisted": return "home";
                case "private": return "followers";
                case "direct": return "specified";
                default: return "public";
            }
        }

        function getAuthCodeRedirect() {
            document.location = `${serverUrl}/oauth/authorize?response_type=code&redirect_uri=${redirect_uri}&scope=write&client_id=${app_info.client_id}`;
        }

        function startMiAuth() {
            // ランダムなセッションIDを生成
            const session = Math.random().toString(36).slice(2);
            window.localStorage.setItem('miauth_session', session);

            // MiAuth URL生成
            const url = `${serverUrl}/miauth/${session}?name=${encodeURIComponent(miauth_name)}&callback=${encodeURIComponent(redirect_uri)}&permission=${encodeURIComponent(miauth_permission.join(','))}`;
            window.location.href = url;
        }

        function enablePostButton() {
            authButton.style.display = 'none';
            postButton.style.display = '';
        }


        // 読み込み時の認証処理
        if (accessToken) { // MastodonもしくはMisskey認証済みの場合
            enablePostButton();
        } else if(code) { // Mastodon認証後の処理
            fetch(`${serverUrl}/oauth/token`, 
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: `code=${code}&client_id=${app_info.client_id}&client_secret=${app_info.client_secret}&grant_type=authorization_code&redirect_uri=${redirect_uri}&scope=write`
                    }
                )
                .then(response => {
                    if (!response.ok) {
                        getAuthCodeRedirect() // トークンエラーのため、再度認証を要求
                        throw "TokenError";
                    }
                    return response.json()
                })
                .then(data =>{
                    accessToken = data.access_token;
                    window.localStorage.setItem(localstorageKeyAccessToken, accessToken);
                    cleanUrlAndReload();
                })
        } else if (miauthSession && app_info.app_type === "misskey") { // Misskey認証後の処理
            fetch(`${serverUrl}/api/miauth/${miauthSession}/check`, 
                    {
                        method: "POST"
                    }
                )
                .then(res => res.json())
                .then(data => {
                    if (data.ok && data.token) {
                        accessToken = data.token;
                        window.localStorage.setItem(localstorageKeyMisskeyAccessToken, accessToken);
                        cleanUrlAndReload();
                    } else {
                        // alert("Misskey認証に失敗しました");
                        cleanUrlAndReload();
                    }
                });
        } else{
            // 未認証。何もしません。
        }
    </script>
